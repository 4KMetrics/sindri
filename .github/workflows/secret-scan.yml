name: secret-scan

# Blocks secrets/keys from landing in this PUBLIC repo. Scans the full git history
# on every push/PR to main; a finding fails the job (and the merge). Layer 2 of 3 —
# see .pre-commit-config.yaml (local) and GitHub push protection (docs/security.md).
#
# Uses the free gitleaks CLI directly (pinned + checksum-verified) rather than
# gitleaks-action, which requires a paid license for org-owned repos. No third-party
# action, no license — and it matches the repo's pin-by-digest supply-chain posture.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0  # full history so the scan covers every commit in the range

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          VER=8.30.1
          SHA=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -fsSL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz"
          echo "${SHA}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version

      - name: Scan full git history for secrets
        run: ./gitleaks git . --redact --no-banner
