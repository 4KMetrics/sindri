name: secret-scan

# Blocks secrets/keys from landing in this PUBLIC repo. Scans the full history on
# every push/PR to main; a finding fails the job (and the merge). Layer 2 of 3 —
# see .pre-commit-config.yaml (local) and GitHub push protection (docs/security.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0  # full history so the scan covers every commit in the range

      - name: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No GITLEAKS_LICENSE needed: it's only required for scanning PRIVATE org
          # repos. This repo is public, so the action runs free.
