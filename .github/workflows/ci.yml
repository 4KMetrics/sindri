name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv (backend is fetched via uvx in e2e + smoke)
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0

      - name: Verify uv is on PATH (fail fast if install broke)
        run: uv --version

      - name: Configure git (required for git_ops + e2e)
        run: |
          git config --global user.email "ci@sindri.local"
          git config --global user.name "Sindri CI"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Fast tests (unit + integration, skip e2e)
        run: pytest -m "not e2e" -q

      - name: End-to-end tests
        if: matrix.python-version == '3.12'
        run: pytest -m e2e -q

      - name: Smoke
        if: matrix.python-version == '3.12'
        run: ./scripts/smoke.sh
