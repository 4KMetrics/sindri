# Local pre-commit hooks — catch secrets BEFORE they're ever committed.
# Enable once per clone:  pipx install pre-commit && pre-commit install
# Run manually on everything: pre-commit run --all-files
#
# Layer 1 of 3 (see .github/workflows/secret-scan.yml + docs/security.md).

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks  # scans staged changes for API keys / tokens / secrets

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key       # PEM/SSH private keys
      - id: check-added-large-files  # a fat blob is often a leaked dump/db
        args: ["--maxkb=1024"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
